name: Golden tests

on: [push]

env:
  QA_MODE: true
  WAITING_SOURCE: s3://mock_bucket/mock_waiting_source.mp4

jobs:
  Run_golden_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: npm ci
      - run: export STAGE="qa$(((RANDOM%99)+1))"
      - run: npx nx run api:deploy
      - run: npx nx run api-goldens:generateEnvironment
      - run: npx nx run api-goldens:run
        continue-on-error: true
      - run: npx nx run api:delete
