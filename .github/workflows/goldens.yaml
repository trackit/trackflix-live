name: Golden tests

permissions:
  id-token: write
  contents: read

on: [push]

env:
  QA_MODE: true
  WAITING_SOURCE: s3://mock_bucket/mock_waiting_source.mp4

jobs:
  Run_golden_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5.0.0
        with:
          aws-region: us-west-2
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: npm ci
      - run: echo "STAGE=qa$(((RANDOM%99)+1))" >> $GITHUB_ENV
      - run: npx nx run api:deploy
      - run: npx nx run api-goldens:generateEnvironment
      - run: npx nx run api-goldens:run
        continue-on-error: true
      - run: npx nx run api:delete
